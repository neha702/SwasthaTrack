spring.application.name=swastha-track
#Connect to postgres db using jdbc (Java DB connectivity protocol)
spring.datasource.url=jdbc:postgresql://localhost:5433/swastha_db
spring.datasource.username=postgres
spring.datasource.password=pwd
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
#(Check if DB schema matches my entities — but don’t change anything)
spring.jpa.hibernate.ddl-auto=none
#Show sql queries in logs
spring.jpa.show-sql=true
# Flyway
# Run Flyway migrations on application startup
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

logging.level.org.springframework.jdbc=DEBUG